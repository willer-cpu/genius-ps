name: Deploy Genius PS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gerar config.js com a chave do Gemini
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "window.GENIUS_GEMINI_KEY='${GEMINI_KEY}';" > config.js
          echo "✅ config.js gerado com sucesso"

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Empacotar arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
