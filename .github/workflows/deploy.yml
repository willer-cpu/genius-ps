- name: Injetar chave do Gemini no HTML
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 -c "
          import os, sys
          key = os.environ.get('GEMINI_KEY', '').strip()
          if not key:
            print('ERRO: secret GEMINI_API_KEY esta vazio ou nao encontrado')
            sys.exit(1)
          
          # Lendo o arquivo principal
          html = open('genius_ps_completo.html', encoding='utf-8').read()
          
          if 'COLE_SUA_CHAVE_AQUI' not in html:
            print('ERRO CRÍTICO: O texto [COLE_SUA_CHAVE_AQUI] nao foi encontrado no topo do arquivo genius_ps_completo.html!')
            sys.exit(1) # Isso vai fazer o GitHub Actions avisar que falhou!
          else:
            html = html.replace('COLE_SUA_CHAVE_AQUI', key)
            open('genius_ps_completo.html', 'w', encoding='utf-8').write(html)
            print('OK: chave injetada com sucesso no arquivo principal')
          "
